name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint · TypeCheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npx eslint . --max-warnings 25
        # We allow warnings (currently ~16 — mostly unused imports + raw <img>
        # tags) but fail on any error. Dial the threshold down as the warning
        # backlog clears.

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Build (production)
        run: npm run build
        env:
          # Provide placeholder Supabase keys so the build doesn't break the
          # SUPABASE_ENABLED detection in lib/supabase.ts. These are public
          # anon keys at runtime anyway — no secrets committed.
          NEXT_PUBLIC_SUPABASE_URL: ""
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ""

  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
